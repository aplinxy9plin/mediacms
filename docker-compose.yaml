version: '3'
services:
  migrations:
    image: 'mediacms/mediacms:latest'
    volumes:
      - 'media_store:/home/mediacms.io/mediacms/media_files/'
      - 'static_store:/home/mediacms.io/mediacms/static/'
    environment:
      ENABLE_UWSGI: 'no'
      ENABLE_NGINX: 'no'
      ENABLE_CELERY_SHORT: 'no'
      ENABLE_CELERY_LONG: 'no'
      ENABLE_CELERY_BEAT: 'no'
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme_admin_password}
      POSTGRES_NAME: ${POSTGRES_DB:-mediacms}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-mediacms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mediacms}
      REDIS_LOCATION: redis://redis:6379/1
      TZ: ${TZ:-Asia/Tomsk}
    command: ./deploy/docker/prestart.sh
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
  web:
    image: 'mediacms/mediacms:latest'
    volumes:
      - 'media_store:/home/mediacms.io/mediacms/media_files/'
      - 'static_store:/home/mediacms.io/mediacms/static/'
    environment:
      ENABLE_CELERY_BEAT: 'no'
      ENABLE_CELERY_SHORT: 'no'
      ENABLE_CELERY_LONG: 'no'
      ENABLE_MIGRATIONS: 'no'
      ENABLE_NGINX: 'yes'
      ENABLE_UWSGI: 'yes'
      FRONTEND_HOST: ${FRONTEND_HOST:-http://localhost}
      PORTAL_NAME: ${PORTAL_NAME:-MediaCMS}
      SECRET_KEY: ${SECRET_KEY:-change-me}
      POSTGRES_NAME: ${POSTGRES_DB:-mediacms}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-mediacms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mediacms}
      REDIS_LOCATION: redis://redis:6379/1
      TZ: ${TZ:-Asia/Tomsk}
    restart: unless-stopped
    depends_on:
      - migrations
  celery_beat:
    image: 'mediacms/mediacms:latest'
    volumes:
      - 'media_store:/home/mediacms.io/mediacms/media_files/'
      - 'static_store:/home/mediacms.io/mediacms/static/'
    environment:
      ENABLE_UWSGI: 'no'
      ENABLE_NGINX: 'no'
      ENABLE_CELERY_SHORT: 'no'
      ENABLE_CELERY_LONG: 'no'
      ENABLE_CELERY_BEAT: 'yes'
      ENABLE_MIGRATIONS: 'no'
      SECRET_KEY: ${SECRET_KEY:-change-me}
      POSTGRES_NAME: ${POSTGRES_DB:-mediacms}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-mediacms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mediacms}
      REDIS_LOCATION: redis://redis:6379/1
      TZ: ${TZ:-Asia/Tomsk}
    restart: unless-stopped
    depends_on:
      - redis
      - migrations
  celery_worker_short:
    image: 'mediacms/mediacms:latest'
    volumes:
      - 'media_store:/home/mediacms.io/mediacms/media_files/'
      - 'static_store:/home/mediacms.io/mediacms/static/'
    environment:
      ENABLE_UWSGI: 'no'
      ENABLE_NGINX: 'no'
      ENABLE_CELERY_BEAT: 'no'
      ENABLE_CELERY_SHORT: 'yes'
      ENABLE_CELERY_LONG: 'no'
      ENABLE_MIGRATIONS: 'no'
      SECRET_KEY: ${SECRET_KEY:-change-me}
      POSTGRES_NAME: ${POSTGRES_DB:-mediacms}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-mediacms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mediacms}
      REDIS_LOCATION: redis://redis:6379/1
      TZ: ${TZ:-Asia/Tomsk}
    restart: unless-stopped
    depends_on:
      - migrations
  celery_worker_long:
    image: 'mediacms/mediacms:latest'
    volumes:
      - 'media_store:/home/mediacms.io/mediacms/media_files/'
      - 'static_store:/home/mediacms.io/mediacms/static/'
    environment:
      ENABLE_UWSGI: 'no'
      ENABLE_NGINX: 'no'
      ENABLE_CELERY_BEAT: 'no'
      ENABLE_CELERY_SHORT: 'no'
      ENABLE_CELERY_LONG: 'yes'
      ENABLE_MIGRATIONS: 'no'
      SECRET_KEY: ${SECRET_KEY:-change-me}
      POSTGRES_NAME: ${POSTGRES_DB:-mediacms}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-mediacms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mediacms}
      REDIS_LOCATION: redis://redis:6379/1
      TZ: ${TZ:-Asia/Tomsk}
    restart: unless-stopped
    depends_on:
      - migrations
  db:
    image: 'postgres:14-alpine'
    volumes:
      - 'mediacms_pg14_data:/var/lib/postgresql/data/'
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mediacms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mediacms}
      POSTGRES_DB: ${POSTGRES_DB:-mediacms}
      TZ: ${TZ:-Asia/Tomsk}
    healthcheck:
      test:
        - CMD-SHELL
        - 'pg_isready -U $$POSTGRES_USER'
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: 'redis:alpine'
    restart: always
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 10s
      timeout: 5s
      retries: 5
volumes:
  mediacms_pg14_data:
    driver: local
  media_store:
    driver: local
  static_store:
    driver: local
