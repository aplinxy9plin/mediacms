version: '3'

# ============================================================
# MediaCMS — one-click docker-compose
# 1. Copy .env.example → .env, set your values
# 2. docker compose up -d
# ============================================================

x-mediacms-env: &mediacms-env
  FRONTEND_HOST: ${FRONTEND_HOST:-http://localhost}
  PORTAL_NAME: ${PORTAL_NAME:-MediaCMS}
  SECRET_KEY: ${SECRET_KEY:-change-me}
  POSTGRES_NAME: ${POSTGRES_DB:-mediacms}
  POSTGRES_HOST: db
  POSTGRES_PORT: '5432'
  POSTGRES_USER: ${POSTGRES_USER:-mediacms}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mediacms}
  REDIS_LOCATION: redis://redis:6379/1
  TZ: ${TZ:-Asia/Tomsk}

x-mediacms-image: &mediacms-image
  build:
    context: .
    dockerfile: Dockerfile.custom

services:
  migrations:
    <<: *mediacms-image
    volumes:
      - 'media_store:/home/mediacms.io/mediacms/media_files/'
      - 'static_store:/home/mediacms.io/mediacms/static/'
    environment:
      <<: *mediacms-env
      ENABLE_UWSGI: 'no'
      ENABLE_NGINX: 'no'
      ENABLE_CELERY_SHORT: 'no'
      ENABLE_CELERY_LONG: 'no'
      ENABLE_CELERY_BEAT: 'no'
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
    command: ./deploy/docker/prestart.sh
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    <<: *mediacms-image
    volumes:
      - 'media_store:/home/mediacms.io/mediacms/media_files/'
      - 'static_store:/home/mediacms.io/mediacms/static/'
    environment:
      <<: *mediacms-env
      ENABLE_CELERY_BEAT: 'no'
      ENABLE_CELERY_SHORT: 'no'
      ENABLE_CELERY_LONG: 'no'
      ENABLE_MIGRATIONS: 'no'
      ENABLE_NGINX: 'yes'
      ENABLE_UWSGI: 'yes'
    restart: unless-stopped
    depends_on:
      - migrations

  celery_beat:
    <<: *mediacms-image
    volumes:
      - 'media_store:/home/mediacms.io/mediacms/media_files/'
      - 'static_store:/home/mediacms.io/mediacms/static/'
    environment:
      <<: *mediacms-env
      ENABLE_UWSGI: 'no'
      ENABLE_NGINX: 'no'
      ENABLE_CELERY_SHORT: 'no'
      ENABLE_CELERY_LONG: 'no'
      ENABLE_CELERY_BEAT: 'yes'
      ENABLE_MIGRATIONS: 'no'
    restart: unless-stopped
    depends_on:
      - redis
      - migrations

  celery_worker_short:
    <<: *mediacms-image
    volumes:
      - 'media_store:/home/mediacms.io/mediacms/media_files/'
      - 'static_store:/home/mediacms.io/mediacms/static/'
    environment:
      <<: *mediacms-env
      ENABLE_UWSGI: 'no'
      ENABLE_NGINX: 'no'
      ENABLE_CELERY_BEAT: 'no'
      ENABLE_CELERY_SHORT: 'yes'
      ENABLE_CELERY_LONG: 'no'
      ENABLE_MIGRATIONS: 'no'
    restart: unless-stopped
    depends_on:
      - migrations

  celery_worker_long:
    <<: *mediacms-image
    volumes:
      - 'media_store:/home/mediacms.io/mediacms/media_files/'
      - 'static_store:/home/mediacms.io/mediacms/static/'
    environment:
      <<: *mediacms-env
      ENABLE_UWSGI: 'no'
      ENABLE_NGINX: 'no'
      ENABLE_CELERY_BEAT: 'no'
      ENABLE_CELERY_SHORT: 'no'
      ENABLE_CELERY_LONG: 'yes'
      ENABLE_MIGRATIONS: 'no'
    restart: unless-stopped
    depends_on:
      - migrations

  db:
    image: 'postgres:17-alpine'
    volumes:
      - 'postgres_data:/var/lib/postgresql/data/'
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mediacms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mediacms}
      POSTGRES_DB: ${POSTGRES_DB:-mediacms}
      TZ: ${TZ:-Asia/Tomsk}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: 'redis:alpine'
    restart: always
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  media_store:
  static_store:
